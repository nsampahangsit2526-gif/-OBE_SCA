<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>คู่มือการวัดและประเมินผล & YLOs/PLOs Tracking Plan · สื่อสารการกีฬา มกช.</title>
<meta name="description" content="คู่มือการวัดและประเมินผลสัมฤทธิ์ทางการศึกษา และแผนติดตามผลลัพธ์การเรียนรู้รายชั้นปี (YLOs/PLOs Tracking Plan) หลักสูตรศิลปศาสตรบัณฑิต สาขาวิชาสื่อสารการกีฬา มหาวิทยาลัยการกีฬาแห่งชาติ วิทยาเขตกรุงเทพ">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;500;600;700&family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
 --ink:#0E1A2B; --navy:#13283F; --navy2:#1C3A5A; --paper:#EEF2F7; --card:#FFFFFF;
 --line:#DCE4EE; --muted:#5E6E82; --soft:#8294A8;
 --energy:#FF5A2C; --teal:#0FB5A6;
 --p1:#2F6FED; --p2:#0FB5A6; --p3:#7C5CFF; --p4:#FF7A18;
 --shadow:0 1px 2px rgba(16,26,43,.06),0 8px 24px rgba(16,26,43,.06);
 --radius:14px;
}
html{scroll-behavior:smooth}
@media (prefers-reduced-motion:reduce){html{scroll-behavior:auto}*{animation:none!important;transition:none!important}}
body{font-family:'Sarabun',system-ui,sans-serif;background:var(--paper);color:var(--ink);line-height:1.55;font-size:16px;-webkit-font-smoothing:antialiased}
h1,h2,h3,.kanit,.num{font-family:'Kanit',sans-serif;font-weight:600;letter-spacing:.2px}
a{color:inherit}
/* topbar */
.topbar{position:sticky;top:0;z-index:50;background:linear-gradient(100deg,var(--navy),var(--navy2));color:#fff;border-bottom:1px solid rgba(255,255,255,.08)}
.topbar-in{max-width:1200px;margin:0 auto;display:flex;align-items:center;gap:14px;padding:10px 20px}
.brand{display:flex;align-items:center;gap:11px;min-width:0}
.logo{width:38px;height:38px;border-radius:10px;background:var(--energy);display:grid;place-items:center;flex:none;box-shadow:0 4px 14px rgba(255,90,44,.4)}
.logo svg{width:22px;height:22px}
.brand .t{min-width:0}
.brand .t b{font-family:'Kanit';font-weight:600;font-size:15px;display:block;line-height:1.15;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.brand .t span{font-size:11.5px;color:#A9C0D8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block}
.spacer{flex:1}
.seg{display:flex;background:rgba(255,255,255,.10);border-radius:999px;padding:3px;gap:2px}
.seg button{font-family:'Kanit';font-weight:500;font-size:13px;color:#cfe0f0;background:none;border:0;padding:6px 13px;border-radius:999px;cursor:pointer;white-space:nowrap}
.seg button.on{background:#fff;color:var(--navy)}
.iconbtn{background:rgba(255,255,255,.10);border:0;color:#fff;width:36px;height:36px;border-radius:9px;cursor:pointer;display:grid;place-items:center}
.iconbtn svg{width:18px;height:18px}
/* layout */
.wrap{max-width:1200px;margin:0 auto;display:grid;grid-template-columns:236px 1fr;gap:26px;padding:22px 20px 70px}
.side{position:sticky;top:74px;align-self:start;max-height:calc(100vh - 90px);overflow:auto}
.side nav{display:flex;flex-direction:column;gap:2px}
.side a{display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:10px;color:var(--muted);font-size:14.5px;text-decoration:none;border-left:3px solid transparent}
.side a .dot{width:7px;height:7px;border-radius:50%;background:var(--line);flex:none}
.side a:hover{background:#fff;color:var(--ink)}
.side a.on{background:#fff;color:var(--ink);border-left-color:var(--energy);box-shadow:var(--shadow);font-weight:500;font-family:'Kanit'}
.side a.on .dot{background:var(--energy)}
.side .grp{font-size:11px;color:var(--soft);text-transform:uppercase;letter-spacing:1.4px;padding:14px 12px 6px;font-family:'Kanit'}
.tag{font-size:10.5px;font-family:'Kanit';padding:1px 7px;border-radius:999px;background:#E8EEF6;color:var(--muted);margin-left:auto}
.tag.staff{background:#EAE7FB;color:#5B46C9}.tag.student{background:#FFEDE3;color:#D9551F}
/* sections */
.main{min-width:0}
section{margin-bottom:34px;scroll-margin-top:78px}
.eyebrow{font-family:'Kanit';font-weight:600;font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--energy);margin-bottom:6px}
section>h2{font-size:23px;margin-bottom:4px}
.lead{color:var(--muted);margin-bottom:16px;max-width:70ch}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
.pad{padding:18px 20px}
.grid{display:grid;gap:14px}
/* hero */
.hero{background:radial-gradient(1200px 400px at 85% -40%,rgba(255,90,44,.28),transparent),linear-gradient(120deg,#0F2238,#1B3A5B);color:#fff;border-radius:20px;padding:30px 30px 26px;position:relative;overflow:hidden;margin-bottom:28px}
.hero:after{content:"";position:absolute;right:-60px;top:-60px;width:240px;height:240px;border:2px solid rgba(255,255,255,.07);border-radius:50%}
.hero:before{content:"";position:absolute;right:10px;bottom:-90px;width:300px;height:300px;border:2px solid rgba(255,255,255,.05);border-radius:50%}
.hero .ey{color:#FFB59C;font-family:'Kanit';font-weight:600;letter-spacing:2px;font-size:12px;text-transform:uppercase}
.hero .philo{font-family:'Kanit';font-weight:700;font-size:clamp(26px,4vw,40px);line-height:1.1;margin:8px 0 6px;max-width:18ch}
.hero .vh{color:#B7CCE2;font-size:14px;max-width:60ch}
.scoreboard{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:22px;position:relative;z-index:2}
.score{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:12px 14px}
.score b{font-family:'Kanit';font-weight:700;font-size:30px;display:block;line-height:1}
.score span{font-size:12px;color:#AEC4DC}
/* PLO cards */
.plos{grid-template-columns:repeat(2,1fr)}
.plo{display:flex;gap:14px;padding:16px 18px;position:relative;overflow:hidden}
.plo:before{content:"";position:absolute;left:0;top:0;bottom:0;width:5px;background:var(--c)}
.jersey{width:46px;height:46px;border-radius:12px;background:var(--c);color:#fff;font-family:'Kanit';font-weight:700;font-size:22px;display:grid;place-items:center;flex:none}
.chip-d{display:inline-block;font-family:'Kanit';font-size:11.5px;font-weight:500;padding:2px 9px;border-radius:999px;background:color-mix(in srgb,var(--c) 14%,#fff);color:var(--c);margin-bottom:4px}
.plo .x b{font-family:'Kanit';font-size:15px}
.plo .x p{font-size:14px;color:#33445A;margin-top:3px}
/* YLO timeline */
.season{position:relative;padding-left:34px}
.season:before{content:"";position:absolute;left:14px;top:6px;bottom:6px;width:3px;background:linear-gradient(var(--p1),var(--teal),var(--energy))}
.ylo{position:relative;margin-bottom:14px}
.ylo .node{position:absolute;left:-34px;top:14px;width:30px;height:30px;border-radius:50%;background:#fff;border:3px solid var(--energy);color:var(--ink);font-family:'Kanit';font-weight:700;display:grid;place-items:center;font-size:15px}
.ylo .yhead{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:6px}
.ylo .yhead b{font-family:'Kanit';font-size:16px}
.badges{display:flex;gap:5px;flex-wrap:wrap}
.pb{width:24px;height:24px;border-radius:7px;color:#fff;font-family:'Kanit';font-weight:600;font-size:12.5px;display:grid;place-items:center}
.assess-list{margin-top:8px;display:grid;gap:5px}
.assess-list div{font-size:13.5px;color:#3A4A5E;padding-left:18px;position:relative}
.assess-list div:before{content:"";position:absolute;left:3px;top:8px;width:7px;height:7px;border-radius:50%;background:var(--teal)}
/* tables */
.tbl{width:100%;border-collapse:collapse;font-size:14px}
.tbl th{background:var(--navy);color:#fff;font-family:'Kanit';font-weight:500;text-align:left;padding:9px 11px;position:sticky;top:0}
.tbl td{padding:8px 11px;border-bottom:1px solid var(--line);vertical-align:top}
.tbl tr:nth-child(even) td{background:#F7FAFD}
.tbl .center{text-align:center}
.scroller{overflow:auto;border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);max-height:560px}
.dot{display:inline-block;width:13px;height:13px;border-radius:50%}
.code{font-family:'Kanit';font-weight:500;color:var(--navy2);white-space:nowrap}
.grouprow td{background:#EAF0F7!important;font-family:'Kanit';font-weight:500;color:var(--navy)}
.subrow td{background:#F2F6FB!important;color:var(--muted);font-size:12.5px;font-family:'Kanit'}
/* filters */
.filters{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:12px}
.flabel{font-family:'Kanit';font-size:12px;color:var(--soft);margin-right:2px}
.chip{font-family:'Kanit';font-weight:500;font-size:13px;border:1.5px solid var(--line);background:#fff;color:var(--muted);padding:5px 12px;border-radius:999px;cursor:pointer;user-select:none}
.chip.on{color:#fff;border-color:transparent}
.chip.p1.on{background:var(--p1)}.chip.p2.on{background:var(--p2)}.chip.p3.on{background:var(--p3)}.chip.p4.on{background:var(--p4)}
.chip.yr.on{background:var(--navy)}
.search{flex:1;min-width:170px;border:1.5px solid var(--line);border-radius:999px;padding:7px 14px;font-family:'Sarabun';font-size:14px;outline:none}
.search:focus{border-color:var(--energy)}
.count{font-family:'Kanit';font-size:13px;color:var(--muted);white-space:nowrap}
.legend{font-size:12.5px;color:var(--muted);margin-top:8px;display:flex;gap:14px;flex-wrap:wrap}
.legend span{display:flex;align-items:center;gap:6px}
/* assess levels */
.levels{grid-template-columns:repeat(3,1fr)}
.level h3{font-size:16px;margin-bottom:3px}
.level .when{font-family:'Kanit';font-size:11.5px;color:var(--energy);font-weight:500;text-transform:uppercase;letter-spacing:.5px}
.level ul{margin:9px 0 0;padding-left:0;list-style:none;display:grid;gap:6px}
.level li{font-size:13.5px;color:#3A4A5E;padding-left:16px;position:relative}
.level li:before{content:"›";position:absolute;left:2px;color:var(--energy);font-weight:700}
.by{margin-top:10px;font-size:12.5px;color:var(--muted);border-top:1px dashed var(--line);padding-top:8px}
/* grades */
.gradewrap{display:flex;flex-wrap:wrap;gap:9px}
.grade{display:flex;align-items:center;gap:10px;border:1px solid var(--line);border-radius:11px;padding:8px 12px;background:#fff;min-width:150px}
.grade b{font-family:'Kanit';font-weight:700;font-size:18px;width:34px;height:34px;border-radius:8px;display:grid;place-items:center;color:#fff;background:var(--navy2)}
.grade .gv{font-family:'Kanit';color:var(--energy);font-weight:600;margin-left:auto}
.grade small{display:block;color:var(--muted);font-size:12px}
/* tracking */
.trk .yr{font-family:'Kanit';font-weight:700;font-size:18px;color:var(--energy)}
.trk ul{margin:0;padding-left:16px}.trk li{font-size:13px;margin-bottom:2px}
/* steps */
.steps{counter-reset:s;display:grid;gap:7px}
.steps .st{display:flex;gap:12px;align-items:flex-start;background:#fff;border:1px solid var(--line);border-radius:10px;padding:8px 12px}
.steps .st b{counter-increment:s;font-family:'Kanit';font-weight:700;color:#fff;background:var(--navy2);width:25px;height:25px;border-radius:7px;display:grid;place-items:center;font-size:13px;flex:none}
.steps .st b:before{content:counter(s)}
.steps .st span{font-size:14px}
/* checklist */
.checkwrap{display:grid;grid-template-columns:1fr 150px;gap:20px;align-items:start}
.checks{display:grid;gap:9px}
.ck{display:flex;gap:12px;align-items:flex-start;background:#fff;border:1px solid var(--line);border-radius:11px;padding:11px 14px;cursor:pointer;transition:border-color .15s,background .15s}
.ck:hover{border-color:var(--teal)}
.ck.done{background:#F1FBF8;border-color:#BEE9DF}
.box{width:24px;height:24px;border-radius:7px;border:2px solid var(--line);flex:none;display:grid;place-items:center;margin-top:1px}
.ck.done .box{background:var(--teal);border-color:var(--teal)}
.box svg{width:14px;height:14px;opacity:0;color:#fff}
.ck.done .box svg{opacity:1}
.ck span{font-size:14.5px}
.ck.done span{color:var(--muted)}
.ringcard{position:sticky;top:80px;text-align:center;padding:18px}
.ring{width:118px;height:118px;margin:0 auto 6px}
.ring text{font-family:'Kanit';font-weight:700}
.ringcard p{font-size:13px;color:var(--muted)}
.reset{margin-top:10px;font-family:'Kanit';font-size:12.5px;color:var(--energy);background:none;border:0;cursor:pointer;text-decoration:underline}
/* two-col cards */
.kv{width:100%;border-collapse:collapse;font-size:14px}
.kv td{padding:8px 11px;border-bottom:1px solid var(--line);vertical-align:top}
.kv tr td:first-child{font-family:'Kanit';font-weight:500;color:var(--navy);width:34%}
.kv tr:last-child td{border-bottom:0}
.note{font-size:13px;color:var(--muted);background:#F4F7FB;border-left:3px solid var(--energy);border-radius:0 8px 8px 0;padding:10px 14px;margin-top:14px}
.foot{max-width:1200px;margin:0 auto;padding:22px 20px 40px;color:var(--muted);font-size:12.5px;border-top:1px solid var(--line)}
.hide{display:none!important}
/* responsive */
@media(max-width:900px){
 .wrap{grid-template-columns:1fr;gap:0;padding:0 0 60px}
 .side{position:sticky;top:58px;max-height:none;background:var(--paper);z-index:30;padding:8px 12px;border-bottom:1px solid var(--line)}
 .side nav{flex-direction:row;overflow-x:auto;gap:6px;padding-bottom:2px}
 .side .grp{display:none}
 .side a{white-space:nowrap;border-left:0;border-bottom:3px solid transparent;border-radius:8px;padding:7px 11px}
 .side a.on{border-left:0;border-bottom-color:var(--energy)}
 .side a .tag{display:none}
 .main{padding:18px 16px}
 .hero{padding:24px 20px}
 .plos,.levels{grid-template-columns:1fr}
 .scoreboard{grid-template-columns:repeat(2,1fr)}
 .checkwrap{grid-template-columns:1fr}.ringcard{position:static}
 .brand .t span{display:none}
}
@media print{
 .topbar,.side,.iconbtn,.reset,.filters{display:none!important}
 .wrap{grid-template-columns:1fr;display:block}
 .hide{display:block!important}
 section{page-break-inside:avoid}.scroller{max-height:none}
 body{background:#fff}
}

</style>
</head>
<body>
<header class="topbar"><div class="topbar-in">
 <div class="brand">
   <div class="logo"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 3v18M3 12h18M6 6l12 12M18 6L6 18"/></svg></div>
   <div class="t"><b>สื่อสารการกีฬา · มกช. กรุงเทพ</b><span>คู่มือการวัดและประเมินผล & YLOs/PLOs Tracking Plan</span></div>
 </div>
 <div class="spacer"></div>
 <div class="seg" id="seg">
   <button class="on" data-aud="all">ทั้งหมด</button>
   <button data-aud="student">นักศึกษา</button>
   <button data-aud="staff">อาจารย์</button>
 </div>
 <button class="iconbtn" id="print" title="พิมพ์ / บันทึก PDF"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9V2h12v7M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2M6 14h12v8H6z"/></svg></button>
</div></header>

<div class="wrap">
 <aside class="side"><nav id="nav"></nav></aside>

<script>

 {id:'track',label:'Tracking Plan (YLOs/PLOs)'},

];

});

/* ---------- render ---------- */
const M = document.getElementById('main');

}

</div>`);
M.appendChild(hero);

/* overview: structure + objective note */
(()=>{

 const t=el(`<table class="kv"></table>`);
 D.structure.forEach(r=>{
   const lead = r[0].startsWith('    ');
   t.appendChild(el(`<tr><td style="${lead?'padding-left:26px;font-weight:400;color:#3A4A5E':''}">${esc(r[0].trim())}</td><td class="code">${esc(r[1])} หน่วยกิต</td></tr>`));
 });
 card.appendChild(t);
 card.appendChild(el(`<div class="note">หลักสูตร 4 ปี ประเภทวิชาการ จัดการศึกษาแบบมุ่งผลลัพธ์ (OBE) ออกแบบให้ผลลัพธ์การเรียนรู้ การจัดการเรียนการสอน และการวัดประเมินผลสอดคล้องกัน (Constructive Alignment)</div>`));
 sec('overview','Overview','ภาพรวมหลักสูตร','หลักสูตรศิลปศาสตรบัณฑิต สาขาวิชาสื่อสารการกีฬา มุ่งผลิตบัณฑิตที่บูรณาการความรู้ด้านการสื่อสารสู่การเป็นนักสื่อสารทางการกีฬาที่มีคุณธรรมและจรรยาบรรณวิชาชีพ',[card]);
})();

/* PLOs */
(()=>{

   </div>`));
 });
 sec('plos','Program Outcomes','ผลลัพธ์การเรียนรู้ระดับหลักสูตร (PLOs)','สิ่งที่ผู้สำเร็จการศึกษาทุกคนต้องทำได้ จำแนกตามด้านความรู้ ทักษะ และจริยธรรม/ลักษณะบุคคล',[g]);
})();

/* YLOs season timeline */
(()=>{

     </div>

/* Curriculum Mapping (interactive) */
(()=>{

   ${[1,2,3,4].map(n=>`<span class="chip p${n}" data-plo="${n}">PLO ${n}</span>`).join('')}

   ${[1,2,3,4].map(n=>`<span class="chip yr" data-yr="${n}">ปี ${n}</span>`).join('')}

   <span class="count" id="cnt"></span>
 </div>`);
 const scr=el(`<div class="scroller"><table class="tbl" id="maptbl"><thead><tr>
   <th>รายวิชา</th><th class="center">ปี</th>
   <th class="center" style="color:#fff">PLO1</th><th class="center">PLO2</th><th class="center">PLO3</th><th class="center">PLO4</th>
 </tr></thead><tbody id="mapbody"></tbody></table></div>`);
 const legend=el(`<div class="legend">
   <span><i class="dot" style="background:var(--p1)"></i> PLO1 ความรู้</span>
   <span><i class="dot" style="background:var(--p2)"></i> PLO2 ทักษะ (ภาษาอังกฤษ)</span>
   <span><i class="dot" style="background:var(--p3)"></i> PLO3 ทักษะ (ผลิตสื่อ/ออกแบบ)</span>
   <span><i class="dot" style="background:var(--p4)"></i> PLO4 จริยธรรม/ลักษณะบุคคล</span>
 </div>`);
 sec('map','Curriculum Mapping','แผนที่การกระจายความรับผิดชอบ PLOs สู่รายวิชา','112 รายวิชา · กรองตาม PLO หรือชั้นปี และค้นหาชื่อวิชา เพื่อดูว่าวิชาใดรับผิดชอบผลลัพธ์การเรียนรู้ด้านใด (อ้างอิงตาราง 8 ใน มคอ.2)',[filt,scr,legend]);

 const state={plo:new Set(),yr:new Set(),q:''};
 const isCat=(t)=>/^\d+\.\s*หมวดวิชา/.test(t);
 function pass(c){
   if(state.plo.size){let ok=false;state.plo.forEach(n=>{if(c.p[n-1])ok=true});if(!ok)return false;}
   if(state.yr.size && !state.yr.has(c.year))return false;
   if(state.q){const s=(c.code+' '+c.name).toLowerCase();if(!s.includes(state.q))return false;}
   return true;
 }
 function render(){
   const body=document.getElementById('mapbody');body.innerHTML='';
   let pending=[],shown=0,total=0;
   D.mapItems.forEach(it=>{
     if(it.t==='h'){const lvl=isCat(it.text)?1:2;pending=pending.filter(p=>p.lvl<lvl);pending.push({lvl,text:it.text});return;}
     total++;
     if(!pass(it))return;
     pending.forEach(p=>{body.appendChild(el(`<tr class="${p.lvl===1?'grouprow':'subrow'}"><td colspan="6">${esc(p.text)}</td></tr>`));});

/* grad checklist */
(()=>{
 const wrap=el(`<div class="checkwrap"></div>`);
 const checks=el(`<div class="checks"></div>`);
 const ringcard=el(`<div class="card ringcard">
   <svg class="ring" viewBox="0 0 120 120"><circle cx="60" cy="60" r="50" fill="none" stroke="#E3E9F0" stroke-width="11"/>
   <circle id="prog" cx="60" cy="60" r="50" fill="none" stroke="var(--teal)" stroke-width="11" stroke-linecap="round" stroke-dasharray="314.16" stroke-dashoffset="314.16" transform="rotate(-90 60 60)"/>
   <text id="pct" x="60" y="67" text-anchor="middle" font-size="26" fill="var(--ink)">0%</text></svg>
   <p>ความคืบหน้าสู่การสำเร็จการศึกษา</p><button class="reset" id="rs">ล้างการติ๊ก</button></div>`);
 let done=load();
 function save(a){try{localStorage.setItem('tnsu_grad',JSON.stringify(a))}catch(e){}}
 function load(){try{return JSON.parse(localStorage.getItem('tnsu_grad')||'[]')}catch(e){return[]}}
 D.grad.forEach((g,i)=>{
   const row=el(`<div class="ck" data-i="${i}"><span class="box"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M5 13l4 4L19 7"/></svg></span><span>${esc(g)}</span></div>`);
   row.onclick=()=>{const i=+row.dataset.i;const k=done.indexOf(i);k>-1?done.splice(k,1):done.push(i);save(done);paint();};
   checks.appendChild(row);
 });
 function paint(){
   checks.querySelectorAll('.ck').forEach(c=>c.classList.toggle('done',done.includes(+c.dataset.i)));
   const pct=Math.round(done.length/D.grad.length*100);
   document.getElementById('pct').textContent=pct+'%';
   document.getElementById('prog').setAttribute('stroke-dashoffset',314.16*(1-pct/100));
 }
 ringcard.querySelector('#rs').onclick=()=>{done=[];save(done);paint();};
 wrap.appendChild(checks);wrap.appendChild(ringcard);
 sec('grad','Graduation','เกณฑ์การสำเร็จการศึกษา','ติ๊กรายการที่ทำสำเร็จเพื่อติดตามความคืบหน้าของตนเอง (บันทึกไว้ในเครื่องนี้)',[wrap]);
 paint();
})();

/* ---------- audience filter ---------- */
const seg=document.getElementById('seg');
function applyAud(mode){
 document.querySelectorAll('[data-nav]').forEach(a=>{
   const t=a.dataset.tag;
   const show = mode==='all' || t==='all' || t===mode;
   a.classList.toggle('hide',!show);
   const sct=document.getElementById(a.dataset.nav);
   if(sct) sct.classList.toggle('hide',!show);
 });
 // hide empty group labels
 document.querySelectorAll('#nav .grp').forEach(g=>{
   let n=g.nextElementSibling,any=false;
   while(n&&!n.classList.contains('grp')){if(n.matches('a')&&!n.classList.contains('hide'))any=true;n=n.nextElementSibling;}
   g.classList.toggle('hide',!any);
 });
}
seg.querySelectorAll('button').forEach(b=>b.onclick=()=>{seg.querySelectorAll('button').forEach(x=>x.classList.remove('on'));b.classList.add('on');applyAud(b.dataset.aud);});
applyAud('all');

/* ---------- scrollspy ---------- */
const io=new IntersectionObserver((ents)=>{
 ents.forEach(e=>{if(e.isIntersecting){const id=e.target.id;document.querySelectorAll('[data-nav]').forEach(a=>a.classList.toggle('on',a.dataset.nav===id));}});
},{rootMargin:'-20% 0px -70% 0px',threshold:0});
document.querySelectorAll('section').forEach(s=>io.observe(s));

/* print */
document.getElementById('print').onclick=()=>window.print();
